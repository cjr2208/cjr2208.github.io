<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Babbling Brook</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			font-family: sans-serif;
			background: #f5f7fb;
		}

		#playBtn {
			padding: 12px 20px;
			font-size: 16px;
			border: 1px solid #c6d0e0;
			border-radius: 8px;
			background: #ffffff;
			cursor: pointer;
		}

		#playBtn:disabled {
			cursor: default;
			opacity: 0.75;
		}
	</style>
</head>
<body>
	<button id="playBtn" type="button">Play</button>
	<script src="./farnell2.js"></script>

</html>
